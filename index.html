<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>點餐系統</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://js.stripe.com/v3/"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Noto+Serif+TC:wght@400;500;600;700;900&display=swap" rel="stylesheet">

    <style>
        /* 日式定食店風格配色 - 淡雅清新 */
        :root {
            --wood-dark: #6B4423;
            --wood-medium: #8B6F47;
            --wood-light: #D4A574;
            --wood-pale: #E8DCC8;
            --cream: #FFFBF5;
            --cream-dark: #F9F5EF;
            --taiwan-red: #C1272D;
            --taiwan-green: #2F5233;
            --warm-white: #FFFFFF;
            --text-dark: #3E2723;
            --text-medium: #5D4037;
            --shadow-soft: rgba(107, 68, 35, 0.08);
            --shadow-medium: rgba(107, 68, 35, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Lora', 'Noto Serif TC', serif;
            background: linear-gradient(135deg, var(--wood-pale) 0%, var(--cream-dark) 100%);
            min-height: 100vh;
            position: relative;
        }

        /* 淡雅木質紋理背景 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image:
                repeating-linear-gradient(90deg, transparent, transparent 3px, rgba(107, 68, 35, 0.015) 3px, rgba(107, 68, 35, 0.015) 6px),
                repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(107, 68, 35, 0.01) 3px, rgba(107, 68, 35, 0.01) 6px);
            pointer-events: none;
            z-index: 0;
        }

        .app {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .header {
            background: var(--warm-white);
            padding: 20px 30px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px var(--shadow-soft);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(212, 165, 116, 0.15);
        }

        .header h1 {
            color: var(--wood-dark);
            font-size: 28px;
            text-shadow: 0 1px 2px rgba(107, 68, 35, 0.1);
        }

        .tab-buttons {
            display: flex;
            gap: 10px;
        }

        .tab-btn {
            padding: 10px 20px;
            border: 2px solid var(--wood-light);
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
            background: var(--cream);
            color: var(--wood-dark);
            font-weight: 600;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, var(--wood-medium) 0%, var(--wood-dark) 100%);
            color: var(--warm-white);
            border-color: var(--wood-dark);
        }

        .tab-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(107, 68, 35, 0.25);
            border-color: var(--wood-medium);
        }

        .content {
            background: var(--warm-white);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 2px 8px var(--shadow-soft);
            min-height: 600px;
            border: 1px solid rgba(212, 165, 116, 0.15);
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .menu-item {
            border: 1px solid rgba(212, 165, 116, 0.2);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s;
            cursor: pointer;
            background: var(--warm-white);
            box-shadow: 0 2px 6px var(--shadow-soft);
        }

        .menu-item:hover {
            border-color: var(--wood-light);
            transform: translateY(-3px);
            box-shadow: 0 4px 12px var(--shadow-medium);
        }

        .menu-item-image {
            width: 100%;
            height: 150px;
            background: linear-gradient(135deg, var(--wood-light) 0%, var(--wood-medium) 100%);
            border-radius: 10px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.1);
        }

        .menu-item h3 {
            color: var(--text-dark);
            margin-bottom: 10px;
            font-weight: 700;
        }

        .menu-item-price {
            font-size: 24px;
            color: var(--taiwan-red);
            font-weight: bold;
            margin-bottom: 15px;
        }

        .quantity-control {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
        }

        .quantity-btn {
            width: 35px;
            height: 35px;
            border: 2px solid var(--wood-medium);
            border-radius: 50%;
            background: linear-gradient(135deg, var(--wood-medium) 0%, var(--wood-dark) 100%);
            color: var(--warm-white);
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 2px 6px rgba(107, 68, 35, 0.2);
        }

        .quantity-btn:hover {
            background: linear-gradient(135deg, var(--wood-dark) 0%, var(--wood-medium) 100%);
            transform: scale(1.1);
            box-shadow: 0 4px 12px rgba(107, 68, 35, 0.3);
        }

        .quantity-display {
            font-size: 20px;
            font-weight: bold;
            min-width: 40px;
            text-align: center;
        }

        .cart-summary {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            padding: 20px;
            box-shadow: 0 -4px 6px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-info {
            font-size: 18px;
        }

        .checkout-btn {
            padding: 15px 40px;
            background: linear-gradient(135deg, var(--taiwan-red) 0%, #A01F23 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 12px rgba(193, 39, 45, 0.3);
        }

        .checkout-btn:hover {
            background: linear-gradient(135deg, #A01F23 0%, var(--taiwan-red) 100%);
            transform: scale(1.05);
            box-shadow: 0 6px 16px rgba(193, 39, 45, 0.4);
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: var(--warm-white);
            padding: 30px;
            border-radius: 12px;
            max-width: 800px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            border: 1px solid rgba(212, 165, 116, 0.2);
            box-shadow: 0 4px 20px var(--shadow-medium);
        }

        .modal-header {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            color: var(--wood-dark);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--wood-medium) 0%, var(--wood-dark) 100%);
            color: var(--warm-white);
            box-shadow: 0 2px 8px rgba(107, 68, 35, 0.2);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, var(--wood-dark) 0%, var(--wood-medium) 100%);
            box-shadow: 0 4px 12px rgba(107, 68, 35, 0.3);
        }

        .btn-secondary {
            background: var(--cream);
            color: var(--wood-dark);
            border: 2px solid var(--wood-light);
        }

        .btn-secondary:hover {
            background: var(--cream-dark);
            border-color: var(--wood-medium);
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--taiwan-red) 0%, #A01F23 100%);
            color: white;
            box-shadow: 0 2px 8px rgba(193, 39, 45, 0.2);
        }

        .btn-danger:hover {
            background: linear-gradient(135deg, #A01F23 0%, var(--taiwan-red) 100%);
            box-shadow: 0 4px 12px rgba(193, 39, 45, 0.3);
        }

        .btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .order-card {
            border: 1px solid rgba(212, 165, 116, 0.2);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s;
            background: var(--warm-white);
            box-shadow: 0 2px 6px var(--shadow-soft);
        }

        .order-card:hover {
            border-color: var(--wood-light);
            box-shadow: 0 4px 12px var(--shadow-medium);
            transform: translateY(-2px);
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .order-number {
            font-size: 20px;
            font-weight: bold;
            color: var(--wood-dark);
        }

        .order-status {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }

        .status-new {
            background: #fef3c7;
            color: #1f3a0f;
        }

        .status-preparing {
            background: #dbeafe;
            color: #2563eb;
        }

        .status-ready {
            background: #bfdbfe;
            color: #1e3a8a;
        }

        .status-completed {
            background: #d1fae5;
            color: #059669;
        }

        .status-cancelled {
            background: #fee2e2;
            color: #dc2626;
        }

        .order-items {
            margin: 15px 0;
            padding: 15px;
            background: #f9fafb;
            border-radius: 8px;
        }

        .order-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #8B6F47 0%, #6B4423 100%);
            color: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 12px rgba(107, 68, 35, 0.25);
            border: 2px solid rgba(212, 165, 116, 0.3);
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
        }

        .admin-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .table th,
        .table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e7ff;
        }

        .table th {
            background: #f9fafb;
            font-weight: bold;
            color: var(--wood-dark);
        }

        .table tr:hover {
            background: #f9fafb;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #9ca3af;
        }

        .empty-state-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .login-container {
            max-width: 400px;
            margin: 100px auto;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .login-title {
            text-align: center;
            color: var(--wood-dark);
            margin-bottom: 30px;
            font-size: 28px;
        }

        .search-bar {
            margin-bottom: 20px;
        }

        .search-bar input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e7ff;
            border-radius: 8px;
            font-size: 16px;
        }

        .search-bar input:focus {
            outline: none;
            border-color: var(--wood-medium);
        }

        /* 售罄商品容器 */
        .menu-item-unavailable {
            position: relative;
            opacity: 0.6;
        }

        /* 售罄标签覆盖层 */
        .sold-out-badge {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(239, 68, 68, 0.95);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 18px;
            z-index: 10;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
        }

        /* 禁用的按钮 */
        .quantity-btn:disabled {
            background: #d1d5db;
            cursor: not-allowed;
            opacity: 0.5;
        }

        .quantity-btn:disabled:hover {
            background: #d1d5db;
            transform: none;
        }

        /* 购物车中的售罄商品警告 */
        .cart-item-warning {
            background: #fef3c7;
            border-left: 4px solid #1f3a0f;
            padding: 8px;
            margin-bottom: 10px;
            border-radius: 4px;
        }

        .cart-item-warning-text {
            color: #1f3a0f;
            font-size: 13px;
            font-weight: bold;
        }

        /* 库存状态徽章（后台用） */
        .availability-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
        }

        .badge-available {
            background: #d1fae5;
            color: #059669;
        }

        .badge-unavailable {
            background: #fee2e2;
            color: #dc2626;
        }

        /* Toggle 开关 */
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: 0.3s;
            border-radius: 24px;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }

        input:checked + .toggle-slider {
            background-color: #059669;
        }

        input:checked + .toggle-slider:before {
            transform: translateX(26px);
        }

        .form-group-inline {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* === V0 风格三栏布局 === */
        .three-column-layout {
            display: grid;
            grid-template-columns: 240px 1fr 380px;
            gap: 0;
            height: calc(100vh - 100px);
            max-width: 100%;
            margin: 0 auto;
        }

        /* 左侧分类侧边栏 */
        .category-sidebar {
            background: #2d5016;
            border-right: 1px solid #1f3a0f;
            padding: 24px 16px;
            overflow-y: auto;
        }

        .category-sidebar h3 {
            font-size: 14px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.7);
            text-transform: none;
            letter-spacing: 0.05em;
            margin-bottom: 16px;
        }

        .category-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            margin-bottom: 4px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            color: rgba(255, 255, 255, 0.85);
            font-size: 15px;
            font-weight: 500;
            background: transparent;
            border: none;
            width: 100%;
            text-align: left;
        }

        .category-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .category-item.active {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .category-icon {
            margin-right: 12px;
            font-size: 18px;
        }

        /* 中间内容区 */
        .main-content {
            background: white;
            padding: 24px;
            overflow-y: auto;
        }

        .search-section {
            margin-bottom: 24px;
        }

        .search-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e7e5e4;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.2s;
        }

        .search-input:focus {
            outline: none;
            border-color: #2d5016;
        }

        /* 新的菜单网格（带图片） */
        .menu-grid-v0 {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .menu-card {
            background: white;
            border: 1px solid #e7e5e4;
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
        }

        .menu-card:hover {
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            transform: translateY(-2px);
        }

        .menu-card-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #f5f5f4;
        }

        .menu-card-content {
            padding: 16px;
        }

        .menu-card-title {
            font-size: 18px;
            font-weight: 600;
            color: #1c1917;
            margin-bottom: 8px;
        }

        .menu-card-description {
            font-size: 14px;
            color: #78716c;
            margin-bottom: 12px;
            white-space: pre-line;
        }

        .menu-card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .menu-card-price {
            font-size: 20px;
            font-weight: 700;
            color: #2d5016;
            font-family: 'Space Mono', monospace;
        }

        .add-to-cart-btn {
            padding: 8px 16px;
            background: #2d5016;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .add-to-cart-btn:hover {
            background: #1f3a0f;
        }

        .add-to-cart-btn:disabled {
            background: #d1d5db;
            cursor: not-allowed;
        }

        /* 右侧购物车侧边栏 */
        .cart-sidebar {
            background: #fafaf9;
            border-left: 1px solid #e7e5e4;
            padding: 24px 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .cart-header {
            font-size: 20px;
            font-weight: 700;
            color: #1c1917;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .cart-count {
            background: #2d5016;
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 14px;
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .cart-item-card {
            background: white;
            border: 1px solid #e7e5e4;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
        }

        .cart-item-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 8px;
        }

        .cart-item-name {
            font-size: 15px;
            font-weight: 600;
            color: #1c1917;
            flex: 1;
        }

        .cart-item-remove {
            background: none;
            border: none;
            color: #dc2626;
            cursor: pointer;
            font-size: 18px;
            padding: 0;
            width: 24px;
            height: 24px;
        }

        .cart-item-details {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-item-quantity {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .cart-qty-btn {
            width: 28px;
            height: 28px;
            border: 1px solid #d6d3d1;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .cart-qty-btn:hover {
            background: #f5f5f4;
        }

        .cart-qty-btn:disabled {
            background: #f5f5f4;
            cursor: not-allowed;
            opacity: 0.5;
        }

        .cart-qty-value {
            font-weight: 600;
            min-width: 20px;
            text-align: center;
        }

        .cart-item-price {
            font-size: 16px;
            font-weight: 700;
            color: #1c1917;
            font-family: 'Space Mono', monospace;
        }

        .cart-summary {
            border-top: 2px solid #e7e5e4;
            padding-top: 20px;
        }

        .cart-summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 15px;
        }

        .cart-summary-row.subtotal {

            // 格式化信用卡號（每4位數加空格）
            const formatCardNumber = (value) => {
                const v = value.replace(/\s+/g, '').replace(/[^0-9]/gi, '');
                const matches = v.match(/\d{4,16}/g);
                const match = (matches && matches[0]) || '';
                const parts = [];
                for (let i = 0, len = match.length; i < len; i += 4) {
                    parts.push(match.substring(i, i + 4));
                }
                if (parts.length) {
                    return parts.join(' ');
                } else {
                    return value;
                }
            };

            // 格式化有效期限（MM/YY）
            const formatExpiryDate = (value) => {
                const v = value.replace(/\s+/g, '').replace(/[^0-9]/gi, '');
                if (v.length >= 2) {
                    return v.substring(0, 2) + (v.length > 2 ? ' / ' + v.substring(2, 4) : '');
                }
                return v;
            };

            // 计算预估等待时间
            const calculateEstimatedTime = function(order) {
                if (!order) return 0;

                const baseTime = 15;
                const itemCount = order.items.reduce(function(sum, item) {
                    return sum + item.quantity;
                }, 0);
                const itemAdjustment = Math.floor(itemCount / 3) * 2;

                var statusAdjustment = 0;
                if (order.status === 'preparing') {
                    statusAdjustment = -Math.floor((baseTime + itemAdjustment) / 2);
                } else if (order.status === 'ready' || order.status === 'completed') {
                    return 0;
                }

                const elapsedMinutes = Math.floor((new Date() - new Date(order.created_at)) / 60000);
                const totalEstimated = baseTime + itemAdjustment + statusAdjustment;
                return Math.max(0, totalEstimated - elapsedMinutes);
            };

            const trackOrder = async function(orderId, phone) {
                if (!window.supabaseClient) {
                    return { success: false, message: t('orderNotFound') };

                try {
                    const { data, error } = await window.supabaseClient
                        .from('orders')
                        .select('*')
                        .eq('id', parseInt(orderId))
                        .eq('phone', phone)
                        .single();

                    if (error || !data) {
                        return { success: false, message: t('orderNotFound') };
                    }
                    return { success: true, order: data };

                                    label: choice.label,
                                    price: parseFloat(choice.price || 0),
                                    isEnabled: choice.enabled !== false
                                }))

                        .filter(item => item.choices.length > 0);  // 移除沒有可用選項值的選項

            // 備用：從 localStorage 加載數據
            const loadDataFromLocalStorage = () => {

                    options: item.options || []
                }));

                const libraryData = JSON.parse(localStorage.getItem('optionsLibrary') || '[]');
                const normalizedLibrary = libraryData

                    .map(item => ({
                        ...item,

            const saveMenu = (newMenu) => {

            // saveOrders 已移除

            const addToCart = (item) => {
                if (!item.isAvailable) {
                    alert('此商品暫時售罄');
                    return;
                }

                // 檢查是否有附加選項（支持全局選項庫）
                let itemOptions = [];

                // 優先使用 appliedOptionIds 從全局選項庫獲取選項
                if (item.appliedOptionIds && item.appliedOptionIds.length > 0) {
                    itemOptions = optionsLibrary
                        .filter(opt => item.appliedOptionIds.includes(opt.id) && opt.isEnabled !== false)
                        .map(opt => ({
                            name: opt.name,
                            type: opt.type,
                            required: opt.required,
                            choices: opt.choices.filter(c => c.isEnabled !== false)
                        }));
                }
                // 向後兼容：如果沒有 appliedOptionIds，使用舊的 options
                else if (item.options && item.options.length > 0) {
                    itemOptions = item.options;
                }

                if (itemOptions.length > 0) {
                    // 打開選項彈窗
                    const itemWithOptions = { ...item, options: itemOptions };
                    setSelectedItem(itemWithOptions);
                    // 初始化選項選擇（為必選項設置默認值）
                    const defaultOptions = {};
                    itemOptions.forEach(option => {
                        if (option.type === 'single' && option.required) {
                            defaultOptions[option.name] = option.choices[0].label;
                        } else if (option.type === 'multiple') {
                            defaultOptions[option.name] = [];
                        }
                    });
                    setSelectedOptions(defaultOptions);
                    setShowOptionsModal(true);
                } else {
                    // 沒有選項，直接加入購物車
                    const existing = cart.find(i => i.id === item.id && !i.options);
                    if (existing) {
                        setCart(cart.map(i =>
                            i.id === item.id && !i.options
                                ? { ...i, quantity: i.quantity + 1 }
                                : i
                        ));
                    } else {
                        setCart([...cart, { ...item, quantity: 1 }]);
                    }
                }
            };

            const confirmAddToCart = () => {
                if (!selectedItem) return;

                // 驗證必選項是否都已選擇
                const missingRequired = selectedItem.options.some(option => {
                    if (option.required) {
                        if (option.type === 'single' && !selectedOptions[option.name]) {
                            return true;
                        }
                        if (option.type === 'multiple' && (!selectedOptions[option.name] || selectedOptions[option.name].length === 0)) {
                            return true;

                    }
                    return false;

                if (missingRequired) {
                    alert('請完成所有必選項');

                let optionsPrice = 0;
                selectedItem.options.forEach(option => {
                    if (option.type === 'single' && selectedOptions[option.name]) {
                        const choice = option.choices.find(c => c.label === selectedOptions[option.name]);
                        if (choice) optionsPrice += choice.price;
                    } else if (option.type === 'multiple' && selectedOptions[option.name]) {
                        selectedOptions[option.name].forEach(label => {
                            const choice = option.choices.find(c => c.label === label);
                            if (choice) optionsPrice += choice.price;

                        return newQuantity > 0 ? { ...item, quantity: newQuantity } : null;
                    }

                }).filter(Boolean));
            };

                                        color: 'rgba(255, 255, 255, 0.9)',
                                        textAlign: 'center'
                                    }}>
                                        🔐 您的付款資訊經過加密保護
                                    </div>
                                </div>

                                <div className="btn-group">
                                    <button
                                        className="btn btn-secondary"
                                        onClick={() => setShowCheckoutModal(false)}
                                        disabled={isProcessingPayment}
                                    >
                                        取消
                                    </button>
                                    <button
                                        className="btn btn-primary"
                                        onClick={submitOrder}
                                        disabled={cart.length === 0 || isProcessingPayment}
                                        style={{
                                            opacity: (cart.length === 0 || isProcessingPayment) ? 0.7 : 1,
                                            cursor: (cart.length === 0 || isProcessingPayment) ? 'not-allowed' : 'pointer',
                                            position: 'relative',
                                            minWidth: '150px'
                                        }}
                                    >
                                        {isProcessingPayment ? (
                                            <span style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '8px' }}>
                                                <span style={{
                                                    display: 'inline-block',
                                                    width: '16px',
                                                    height: '16px',
                                                    border: '3px solid rgba(255, 255, 255, 0.3)',
                                                    borderTop: '3px solid white',
                                                    borderRadius: '50%',
                                                    animation: 'spin 1s linear infinite'
                                                }}></span>
                                                處理付款中...
                                            </span>
                                        ) : (
                                            '💳 送出訂單並付款'
                                        )}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 附加選項 Modal */}
                    {showOptionsModal && selectedItem && (
                        <div className="modal" onClick={() => {
                            setShowOptionsModal(false);
                            setSelectedItem(null);
                            setSelectedOptions({});
                        }}>
                            <div className="modal-content" onClick={(e) => e.stopPropagation()}>
                                {/* 商品標題區 */}
                                <div className="options-modal-header">
                                    {selectedItem.image ? (
                                        <img
                                            src={selectedItem.image}
                                            alt={selectedItem.name}
                                            className="options-modal-image"
                                            onError={(e) => {
                                                e.target.style.display = 'none';
                                                e.target.nextSibling.style.display = 'flex';
                                            }}
                                        />
                                    ) : null}
                                    <div
                                        className="options-modal-image-emoji"
                                        style={{ display: selectedItem.image ? 'none' : 'flex' }}
                                    >
                                        {selectedItem.emoji}
                                    </div>
                                    <div className="options-modal-info">
                                        <h2>{selectedItem.name}</h2>
                                        <div className="base-price">基本價格 ${selectedItem.price.toFixed(2)}</div>
                                    </div>
                                </div>

                                {/* 選項列表 */}
                                <div style={{ marginBottom: '20px' }}>
                                    {selectedItem.options && selectedItem.options.map((option, optionIdx) => (
                                        <div key={optionIdx} className="option-group">
                                            <div className="option-group-title">
                                                {option.name}
                                                {option.required && <span className="option-required">（必選）</span>}
                                            </div>
                                            <div className="option-choices">
                                                {option.choices
                                                    .filter(choice => choice.isEnabled !== false) // 只显示启用的选项
                                                    .map((choice, choiceIdx) => {
                                                    const isSelected = option.type === 'single'
                                                        ? selectedOptions[option.name] === choice.label
                                                        : selectedOptions[option.name]?.includes(choice.label);

                                                    return (
                                                        <div
                                                            key={choiceIdx}
                                                            className={`option-choice ${isSelected ? 'selected' : ''}`}
                                                            onClick={() => {
                                                                if (option.type === 'single') {
                                                                    setSelectedOptions({
                                                                        ...selectedOptions,
                                                                        [option.name]: choice.label
                                                                    });
                                                                } else {
                                                                    // Multiple selection
                                                                    const current = selectedOptions[option.name] || [];
                                                                    const newSelection = current.includes(choice.label)
                                                                        ? current.filter(l => l !== choice.label)
                                                                        : [...current, choice.label];
                                                                    setSelectedOptions({
                                                                        ...selectedOptions,
                                                                        [option.name]: newSelection
                                                                    });
                                                                }
                                                            }}
                                                        >
                                                            <input
                                                                type={option.type === 'single' ? 'radio' : 'checkbox'}
                                                                checked={isSelected}
                                                                readOnly
                                                            />
                                                            <span className="option-choice-label">{choice.label}</span>
                                                            {choice.price !== 0 && (
                                                                <span className="option-choice-price">
                                                                    {choice.price > 0 ? '+' : ''} ${choice.price.toFixed(2)}
                                                                </span>
                                                            )}
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                {/* 價格總結 */}
                                <div className="options-summary">
                                    <div className="options-summary-title">選項總結</div>
                                    {selectedItem.options && selectedItem.options.map((option, idx) => {
                                        if (option.type === 'single' && selectedOptions[option.name]) {
                                            const choice = option.choices.find(c => c.label === selectedOptions[option.name]);
                                            if (!choice) return null;
                                            return (
                                                <div key={idx} className="options-summary-item">
                                                    <span>{option.name}: {choice.label}</span>
                                                    {choice.price !== 0 && (
                                                        <span>{choice.price > 0 ? '+' : ''} ${choice.price.toFixed(2)}</span>
                                                    )}
                                                </div>
                                            );
                                        } else if (option.type === 'multiple' && selectedOptions[option.name]?.length > 0) {
                                            return selectedOptions[option.name].map((label, subIdx) => {
                                                const choice = option.choices.find(c => c.label === label);
                                                if (!choice) return null;
                                                return (
                                                    <div key={`${idx}-${subIdx}`} className="options-summary-item">
                                                        <span>{option.name}: {label}</span>
                                                        {choice.price !== 0 && (
                                                            <span>{choice.price > 0 ? '+' : ''} ${choice.price.toFixed(2)}</span>
                                                        )}
                                                    </div>
                                                );
                                            });
                                        }
                                        return null;
                                    })}
                                    <div className="options-total-price">
                                        <span>總價</span>
                                        <span>
                                            ${(() => {
                                                let total = selectedItem.price;
                                                if (selectedItem.options) {
                                                    selectedItem.options.forEach(option => {
                                                        if (option.type === 'single' && selectedOptions[option.name]) {
                                                            const choice = option.choices.find(c => c.label === selectedOptions[option.name]);
                                                            if (choice) total += choice.price;
                                                        } else if (option.type === 'multiple' && selectedOptions[option.name]) {
                                                            selectedOptions[option.name].forEach(label => {
                                                                const choice = option.choices.find(c => c.label === label);
                                                                if (choice) total += choice.price;
                                                            });
                                                        }
                                                    });
                                                }
                                                return total.toFixed(2);
                                            })()}
                                        </span>
                                    </div>
                                </div>

                                {/* 當前總價顯示 */}
                                {(() => {
                                    let currentTotal = selectedItem.price;
                                    if (selectedItem.options) {
                                        selectedItem.options.forEach(option => {
                                            const choices = option.choices.filter(c => c.isEnabled !== false);
                                            if (option.type === 'single') {
                                                const selected = selectedOptions[option.name];
                                                const selectedChoice = choices.find(c => c.label === selected);
                                                if (selectedChoice) currentTotal += selectedChoice.price;
                                            } else {
                                                const selectedLabels = selectedOptions[option.name] || [];
                                                selectedLabels.forEach(label => {
                                                    const choice = choices.find(c => c.label === label);
                                                    if (choice) currentTotal += choice.price;
                                                });
                                            }
                                        });
                                    }
                                    return (
                                        <div style={{
                                            padding: '16px 20px',
                                            background: '#f5f5f4',
                                            borderRadius: '8px',
                                            marginBottom: '15px',
                                            textAlign: 'right'
                                        }}>
                                            <div style={{ fontSize: '14px', color: '#78716c', marginBottom: '4px' }}>
                                                👉 目前價格
                                            </div>
                                            <div style={{ fontSize: '28px', fontWeight: '700', color: '#2d5016' }}>
                                                ${currentTotal.toFixed(2)}
                                            </div>
                                        </div>
                                    );
                                })()}

                                {/* 按鈕組 */}
                                <div className="btn-group">
                                    <button
                                        className="btn btn-secondary"
                                        onClick={() => {
                                            setShowOptionsModal(false);
                                            setSelectedItem(null);
                                            setSelectedOptions({});
                                        }}
                                    >
                                        取消
                                    </button>
                                    <button
                                        className="btn btn-primary"
                                        onClick={confirmAddToCart}
                                        style={{ fontSize: '16px', fontWeight: '600' }}
                                    >
                                        {(() => {
                                            let currentTotal = selectedItem.price;
                                            if (selectedItem.options) {
                                                selectedItem.options.forEach(option => {
                                                    const choices = option.choices.filter(c => c.isEnabled !== false);
                                                    if (option.type === 'single') {
                                                        const selected = selectedOptions[option.name];
                                                        const selectedChoice = choices.find(c => c.label === selected);
                                                        if (selectedChoice) currentTotal += selectedChoice.price;
                                                    } else {
                                                        const selectedLabels = selectedOptions[option.name] || [];
                                                        selectedLabels.forEach(label => {
                                                            const choice = choices.find(c => c.label === label);
                                                            if (choice) currentTotal += choice.price;
                                                        });
                                                    }
                                                });
                                            }
                                            return `加入購物車 – $${currentTotal.toFixed(2)}`;
                                        })()}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 訂單追蹤 Modal */}
                    {showTrackingModal && (
                        <div className="modal" onClick={function() { setShowTrackingModal(false); }}>
                            <div className="modal-content tracking-modal" onClick={function(e) { e.stopPropagation(); }}>
                                <div className="modal-header">
                                    <span>📦 {t('trackOrder')}</span>
                                    <button
                                        onClick={function() {
                                            setShowTrackingModal(false);
                                            setTrackingOrder(null);
                                            setTrackingInput({ orderId: '', phone: '' });
                                        }}
                                        style={{
                                            background: 'none',
                                            border: 'none',
                                            fontSize: '24px',
                                            cursor: 'pointer',
                                            color: '#78716c',
                                            padding: '0',
                                            lineHeight: '1'
                                        }}
                                    >
                                        ×
                                    </button>
                                </div>

                                {!trackingOrder ? (
                                    <div style={{ padding: '20px 0' }}>
                                        <div style={{ marginBottom: '20px', color: '#78716c', textAlign: 'center' }}>
                                            {t('enterOrderId')} & {t('enterPhone')}
                                        </div>
                                        <div style={{ marginBottom: '15px' }}>
                                            <label style={{ display: 'block', marginBottom: '6px', fontWeight: '600', color: '#292524' }}>
                                                {t('orderNumber')}
                                            </label>
                                            <input
                                                type="text"
                                                placeholder={t('enterOrderId')}
                                                value={trackingInput.orderId}
                                                onChange={function(e) {
                                                    setTrackingInput({ orderId: e.target.value, phone: trackingInput.phone });
                                                }}
                                                style={{
                                                    width: '100%',
                                                    padding: '12px',
                                                    border: '2px solid #e7e5e4',
                                                    borderRadius: '8px',
                                                    fontSize: '16px'
                                                }}
                                            />
                                        </div>
                                        <div style={{ marginBottom: '20px' }}>
                                            <label style={{ display: 'block', marginBottom: '6px', fontWeight: '600', color: '#292524' }}>
                                                {t('phone')}
                                            </label>
                                            <input
                                                type="tel"
                                                placeholder={t('enterPhone')}
                                                value={trackingInput.phone}
                                                onChange={function(e) {
                                                    setTrackingInput({ orderId: trackingInput.orderId, phone: e.target.value });
                                                }}
                                                style={{
                                                    width: '100%',
                                                    padding: '12px',
                                                    border: '2px solid #e7e5e4',
                                                    borderRadius: '8px',
                                                    fontSize: '16px'
                                                }}
                                            />
                                        </div>
                                        <button
                                            className="btn btn-primary"
                                            disabled={isLoadingTracking}
                                            onClick={async function() {
                                                if (!trackingInput.orderId || !trackingInput.phone) {
                                                    alert(t('pleaseFillRequired'));
                                                    return;
                                                }
                                                setIsLoadingTracking(true);
                                                const result = await trackOrder(trackingInput.orderId, trackingInput.phone);
                                                setIsLoadingTracking(false);
                                                if (result.success) {
                                                    setTrackingOrder(result.order);
                                                } else {
                                                    alert(result.message);
                                                }
                                            }}
                                            style={{ width: '100%', fontSize: '16px', fontWeight: '600' }}
                                        >
                                            {isLoadingTracking ? t('processing') : t('searchOrder')}
                                        </button>
                                    </div>
                                ) : (
                                    <div style={{ padding: '20px 0' }}>
                                        <div style={{
                                            background: '#f5f5f4',
                                            padding: '16px',
                                            borderRadius: '8px',
                                            marginBottom: '30px',
                                            textAlign: 'center'
                                        }}>
                                            <div style={{ fontSize: '14px', color: '#78716c', marginBottom: '4px' }}>
                                                {t('orderNumber')}
                                            </div>
                                            <div style={{ fontSize: '24px', fontWeight: '700', color: '#2d5016' }}>
                                                #{trackingOrder.id}
                                            </div>
                                        </div>

                                        <div className="progress-tracker" style={{
                                            display: 'flex',
                                            justifyContent: 'space-between',
                                            marginBottom: '30px',
                                            position: 'relative'
                                        }}>
                                            {['new', 'preparing', 'ready'].map(function(status, idx) {
                                                const config = orderStatusConfig[status];
                                                const currentConfig = orderStatusConfig[trackingOrder.status];
                                                const isActive = trackingOrder.status === status;
                                                const isCompleted = currentConfig && config.step < currentConfig.step;
                                                const isCancelled = trackingOrder.status === 'cancelled';

                                                return (
                                                    <div
                                                        key={status}
                                                        style={{
                                                            flex: 1,
                                                            textAlign: 'center',
                                                            position: 'relative',
                                                            zIndex: 1
                                                        }}
                                                    >
                                                        <div style={{
                                                            width: '60px',
                                                            height: '60px',
                                                            borderRadius: '50%',
                                                            background: isCancelled ? '#f5f5f4' : (isActive || isCompleted ? config.color : '#f5f5f4'),
                                                            color: isCancelled ? '#a8a29e' : (isActive || isCompleted ? 'white' : '#a8a29e'),
                                                            display: 'flex',
                                                            alignItems: 'center',
                                                            justifyContent: 'center',
                                                            fontSize: '30px',
                                                            margin: '0 auto 12px',
                                                            border: isCancelled ? '3px solid #e7e5e4' : (isActive ? '3px solid ' + config.color : 'none'),
                                                            boxShadow: isActive && !isCancelled ? '0 4px 12px rgba(0,0,0,0.15)' : 'none'
                                                        }}>
                                                            {isCompleted ? '✓' : config.icon}
                                                        </div>
                                                        <div style={{
                                                            fontSize: '14px',
                                                            fontWeight: isActive ? '700' : '600',
                                                            color: isActive && !isCancelled ? config.color : '#292524',
                                                            marginBottom: '4px'
                                                        }}>
                                                            {t(status === 'new' ? 'orderReceived' : (status === 'preparing' ? 'preparing' : 'readyForPickup'))}
                                                        </div>
                                                        <div style={{ fontSize: '12px', color: '#78716c' }}>
                                                            {t(status === 'new' ? 'orderReceivedDesc' : (status === 'preparing' ? 'preparingDesc' : 'readyForPickupDesc'))}
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>

                                        {trackingOrder.status === 'cancelled' && (
                                            <div style={{
                                                padding: '16px',
                                                background: '#fee2e2',
                                                borderLeft: '4px solid #ef4444',
                                                borderRadius: '8px',
                                                marginBottom: '20px'
                                            }}>
                                                <div style={{ display: 'flex', alignItems: 'center', gap: '10px', marginBottom: '4px' }}>
                                                    <span style={{ fontSize: '24px' }}>❌</span>
                                                    <span style={{ fontSize: '16px', fontWeight: '600', color: '#292524' }}>
                                                        {t('orderCancelled')}
                                                    </span>
                                                </div>
                                                <div style={{ fontSize: '14px', color: '#78716c', marginLeft: '34px' }}>
                                                    {t('orderCancelledDesc')}
                                                </div>
                                            </div>
                                        )}

                                        {trackingOrder.status !== 'completed' && trackingOrder.status !== 'cancelled' && (
                                            <div style={{
                                                padding: '16px',
                                                background: '#e0f2fe',
                                                borderRadius: '8px',
                                                marginBottom: '20px',
                                                textAlign: 'center'
                                            }}>
                                                <div style={{ fontSize: '14px', color: '#0369a1', marginBottom: '4px' }}>
                                                    ⏱️ {t('estimatedTime')}
                                                </div>
                                                <div style={{ fontSize: '28px', fontWeight: '700', color: '#0c4a6e' }}>
                                                    {calculateEstimatedTime(trackingOrder)} {t('minutes')}
                                                </div>
                                            </div>
                                        )}

                                        {trackingOrder.status === 'completed' && (
                                            <div style={{
                                                padding: '16px',
                                                background: '#d1fae5',
                                                borderRadius: '8px',
                                                marginBottom: '20px',
                                                textAlign: 'center'
                                            }}>
                                                <div style={{ fontSize: '20px', fontWeight: '700', color: '#059669' }}>
                                                    ✅ {t('readyNow')}
                                                </div>
                                            </div>
                                        )}

                                        <button
                                            className="btn btn-secondary"
                                            onClick={function() {
                                                setTrackingOrder(null);
                                                setTrackingInput({ orderId: '', phone: '' });
                                            }}
                                            style={{ width: '100%' }}
                                        >
                                            {t('searchOrder')}
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        }


        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
